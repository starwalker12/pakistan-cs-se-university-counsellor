name: Weekly University Scraper

on:
  schedule:
    # Run every Sunday at 6:00 AM UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium

      - name: Run university scraper
        run: |
          python backend/scrape_universities.py

      - name: Rebuild vector database
        run: |
          python backend/build_vector_db.py

      - name: Commit updated data files
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add backend/data/raw/ backend/data/processed/ backend/chroma_db/
          git diff --staged --quiet || git commit -m "Weekly scrape: update university admission data [skip ci]"
          git push
