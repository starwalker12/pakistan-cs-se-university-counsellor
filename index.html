<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Admission Chatbot</title>
  <!-- Link to external CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main container for the chatbot -->
  <div class="container">
    <header class="chat-header">
      <h1>🎓 Admission Helper</h1>
      <p>Ask me anything about university admissions</p>
    </header>

    <!-- Chat messages area -->
    <div class="chat-box" id="chatBox">
      <!-- Messages will be inserted here by JavaScript -->
    </div>

    <!-- Input area -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your question here..." autofocus>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <!-- Link to external JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
