<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Admission Chatbot</title>
  <!-- Favicon (graduation cap emoji) -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <!-- Link to external CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main wrapper that centers the chatbot on the page -->
  <div class="container">

    <!-- ===== Header Section ===== -->
    <!-- Displays the chatbot name, university crest icon, and a short subtitle -->
    <header class="chat-header">
      <div class="header-icon">🎓</div>
      <h1>Admission Helper</h1>
      <p class="subtitle">Ask questions about admissions, fees, deadlines, and programs.</p>
    </header>

    <!-- ===== Chat Messages Area ===== -->
    <!-- All user and bot messages will appear here, inserted by JavaScript -->
    <div class="chat-box" id="chatBox">
      <!-- Messages will be inserted here by JavaScript -->
    </div>

    <!-- ===== Quick Question Buttons ===== -->
    <!-- Predefined buttons that users can click to ask common questions -->
    <div class="quick-questions" id="quickQuestions">
      <button class="quick-btn" data-question="How can I apply?">How can I apply?</button>
      <button class="quick-btn" data-question="What documents are required?">What documents are required?</button>
      <button class="quick-btn" data-question="What is the admission deadline?">What is the admission deadline?</button>
      <button class="quick-btn" data-question="What programs are offered?">What programs are offered?</button>
      <button class="quick-btn" data-question="What is the fee structure?">What is the fee structure?</button>
    </div>

    <!-- ===== Input Area ===== -->
    <!-- Text input box and send button for typing custom questions -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your question here..." autofocus>
      <button id="sendBtn">Send</button>
    </div>

  </div>

  <!-- Link to external JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
